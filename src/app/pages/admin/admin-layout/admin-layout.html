<div class="admin-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#f59e0b"/>
          <path d="M8 22 L16 10 L24 22" stroke="#0b1320" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 18 H21" stroke="#0b1320" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text">TRACI</span>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <p class="nav-section-label">Main</p>
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="nav-item-active"
        class="nav-item"
      >
        <span class="nav-icon" [innerHTML]="item.icon"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Bottom -->
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <p class="user-name">Admin</p>
          <p class="user-role">Super Admin</p>
        </div>
      </div>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
